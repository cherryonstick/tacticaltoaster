
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap');
  .tt-root {
    --brand: #435675;
    --brand-light: #5a72a0;
    --brand-dark: #2e3d55;
    --brand-bg: #1a2536;
    --surface: #212e40;
    --card-bg: #263042;
    --border: rgba(67,86,117,0.5);
    --text: #d4dff0;
    --dim: #7a90ae;
    --accent: #6fa3ef;
    font-family: 'Rajdhani', sans-serif;
    background: var(--brand-bg);
    color: var(--text);
    min-height: 500px;
    padding: 0;
    border-radius: 10px;
    overflow: hidden;
  }
  .tt-header {
    background: var(--brand-dark);
    border-bottom: 2px solid var(--brand);
    padding: 18px 24px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .tt-logo {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
  }
  .tt-logo span {
    color: var(--accent);
  }
  .tt-tagline {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .tt-search {
    display: flex;
    align-items: center;
    background: var(--brand-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    gap: 8px;
  }
  .tt-search input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    width: 160px;
  }
  .tt-search input::placeholder { color: var(--dim); }
  .tt-search svg { opacity: 0.4; }
  .tt-body { padding: 20px 24px; }
  .tt-section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .tt-section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .tt-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .tt-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
  }
  .tt-card:hover {
    border-color: var(--brand-light);
    transform: translateY(-2px);
  }
  .tt-card-thumb {
    width: 100%;
    aspect-ratio: 16/10;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    background: var(--brand-dark);
    position: relative;
  }
  .tt-card-label {
    font-size: 13px;
    font-weight: 700;
    padding: 8px 10px 4px;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .tt-card-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    padding: 0 10px 8px;
  }
  .tt-add-card {
    background: transparent;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    cursor: pointer;
    min-height: 100px;
    transition: border-color 0.15s;
    color: var(--dim);
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
  }
  .tt-add-card:hover { border-color: var(--accent); color: var(--accent); }
  .tt-add-card .plus { font-size: 22px; font-weight: 300; line-height: 1; }
  .tt-modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,16,28,0.85);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .tt-modal-bg.open { display: flex; }
  .tt-modal {
    background: var(--surface);
    border: 1px solid var(--brand);
    border-radius: 10px;
    padding: 24px;
    width: 340px;
    max-width: 90vw;
  }
  .tt-modal h3 {
    font-size: 17px;
    font-weight: 700;
    margin: 0 0 16px;
    color: #fff;
    letter-spacing: 1px;
  }
  .tt-modal label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
    margin-bottom: 5px;
    margin-top: 12px;
  }
  .tt-modal input, .tt-modal select {
    width: 100%;
    background: var(--brand-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    box-sizing: border-box;
  }
  .tt-modal input:focus { border-color: var(--brand-light); }
  .tt-modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .tt-btn {
    flex: 1;
    padding: 9px;
    border-radius: 6px;
    border: 1px solid var(--border);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .tt-btn-primary { background: var(--brand); color: #fff; border-color: var(--brand-light); }
  .tt-btn-primary:hover { background: var(--brand-light); }
  .tt-btn-cancel { background: transparent; color: var(--dim); }
  .tt-btn-cancel:hover { background: var(--card-bg); color: var(--text); }
  .tt-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 1px;
    background: var(--brand);
    color: #c4d6f5;
  }
  .tt-delete {
    position: absolute;
    top: 4px;
    left: 6px;
    opacity: 0;
    font-size: 13px;
    cursor: pointer;
    color: #e06060;
    transition: opacity 0.15s;
    z-index: 2;
    background: rgba(10,16,28,0.7);
    border-radius: 3px;
    padding: 1px 5px;
    line-height: 1.4;
  }
  .tt-card:hover .tt-delete { opacity: 1; }
  .tt-footer {
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tt-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
  }
  .tt-count span { color: var(--accent); }
</style>

<div class="tt-root" id="ttroot">
  <div class="tt-header">
    <div>
      <div class="tt-logo">TACTICAL<span>TOASTER</span></div>
      <div class="tt-tagline">// UNBLOCKED GAMES HUB</div>
    </div>
    <div class="tt-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="search games..." id="searchInput" oninput="filterGames()" />
    </div>
  </div>

  <div class="tt-body">
    <div class="tt-section-label">games</div>
    <div class="tt-grid" id="gameGrid"></div>
  </div>

  <div class="tt-footer">
    <div class="tt-count"><span id="gameCountDisplay">0</span> games loaded</div>
    <div class="tt-tagline">hover a card to remove it</div>
  </div>
</div>

<div class="tt-modal-bg" id="modalBg">
  <div class="tt-modal">
    <h3>+ ADD GAME</h3>
    <label>GAME NAME</label>
    <input type="text" id="gameName" placeholder="e.g. Slope" />
    <label>EMBED URL (iframe src)</label>
    <input type="text" id="gameUrl" placeholder="https://..." />
    <label>CATEGORY</label>
    <select id="gameCat">
      <option value="ACTION">Action</option>
      <option value="RACING">Racing</option>
      <option value="PUZZLE">Puzzle</option>
      <option value="HORROR">Horror</option>
      <option value="SHOOTER">Shooter</option>
      <option value="SPORT">Sport</option>
      <option value="OTHER">Other</option>
    </select>
    <label>ICON (emoji)</label>
    <input type="text" id="gameIcon" placeholder="🎮" maxlength="2" />
    <div class="tt-modal-btns">
      <button class="tt-btn tt-btn-cancel" onclick="closeModal()">CANCEL</button>
      <button class="tt-btn tt-btn-primary" onclick="addGame()">ADD GAME</button>
    </div>
  </div>
</div>

<script>
  let games = JSON.parse(localStorage.getItem('tt_games') || '[]');

  const catColors = {
    ACTION: '#e06060', RACING: '#e0a060', PUZZLE: '#60b8e0',
    HORROR: '#a060e0', SHOOTER: '#e06090', SPORT: '#60e090', OTHER: '#435675'
  };

  function save() { try { localStorage.setItem('tt_games', JSON.stringify(games)); } catch(e){} }

  function renderGames(list) {
    const grid = document.getElementById('gameGrid');
    const filtered = list || games;
    grid.innerHTML = '';
    filtered.forEach((g, i) => {
      const realIndex = list ? games.indexOf(g) : i;
      const col = catColors[g.cat] || '#435675';
      const card = document.createElement('div');
      card.className = 'tt-card';
      card.innerHTML = `
        <div class="tt-delete" onclick="removeGame(${realIndex})">✕</div>
        <div class="tt-card-thumb" style="background:${col}22;">
          <span style="font-size:34px;">${g.icon || '🎮'}</span>
          <div class="tt-badge" style="background:${col}33;color:${col}">${g.cat}</div>
        </div>
        <div class="tt-card-label">${g.name}</div>
        <div class="tt-card-tag">// tap to play</div>
      `;
      card.onclick = (e) => { if (!e.target.classList.contains('tt-delete')) openGame(g); };
      grid.appendChild(card);
    });
    const addBtn = document.createElement('div');
    addBtn.className = 'tt-add-card';
    addBtn.innerHTML = `<div class="plus">+</div><div>ADD GAME</div>`;
    addBtn.onclick = openModal;
    grid.appendChild(addBtn);
    document.getElementById('gameCountDisplay').textContent = games.length;
  }

  function openGame(g) {
    const w = window.open('', '_blank');
    w.document.write(`<!DOCTYPE html><html><head><title>${g.name}</title><style>*{margin:0;padding:0;}html,body{width:100%;height:100%;overflow:hidden;}iframe{width:100%;height:100%;border:none;}</style></head><body><iframe src="${g.url}" allowfullscreen></iframe></body></html>`);
    w.document.close();
  }

  function openModal() { document.getElementById('modalBg').classList.add('open'); }
  function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

  function addGame() {
    const name = document.getElementById('gameName').value.trim();
    const url = document.getElementById('gameUrl').value.trim();
    const cat = document.getElementById('gameCat').value;
    const icon = document.getElementById('gameIcon').value.trim() || '🎮';
    if (!name || !url) return;
    games.push({ name, url, cat, icon });
    save();
    renderGames();
    closeModal();
    document.getElementById('gameName').value = '';
    document.getElementById('gameUrl').value = '';
    document.getElementById('gameIcon').value = '';
  }

  function removeGame(i) { games.splice(i, 1); save(); renderGames(); }

  function filterGames() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = q ? games.filter(g => g.name.toLowerCase().includes(q)) : null;
    renderGames(filtered);
  }

  document.getElementById('modalBg').onclick = (e) => { if (e.target === document.getElementById('modalBg')) closeModal(); };

  renderGames();
</script>
